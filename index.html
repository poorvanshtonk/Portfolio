<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poorvansh Tonk | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
      body { background: #050816 !important; overflow-x: hidden; color: #e5e7eb !important; font-family: "Poppins", system-ui, -apple-system, sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
      @keyframes fadeInUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
      @keyframes fadeInLeft { from { opacity:0; transform:translateX(-30px); } to { opacity:1; transform:translateX(0); } }
      @keyframes fadeInRight { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }
      @keyframes popIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
      .hidden { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease-out, transform 0.8s ease-out; }
      .hidden.show { opacity: 1; transform: translateY(0); }
      a { text-decoration: none; }
      .btn-primary-custom { border-radius: 999px; text-decoration: none; border: none; padding: 0.7rem 1.6rem; cursor: pointer; font-weight: 500; font-size: 0.95rem; transition: transform 0.15s ease, box-shadow 0.15s ease; background: linear-gradient(135deg, #6366f1, #22d3ee); color: #0b1020; box-shadow: 0 12px 30px rgba(79, 70, 229, 0.3); }
      .btn-primary-custom.small { padding: 0.4rem 1rem; font-size: 0.85rem; }
      .btn-primary-custom.large { padding: 1rem 2rem; font-size: 1rem; }
      .btn-primary-custom:hover { transform: translateY(-2px); box-shadow: 0 16px 35px rgba(79, 70, 229, 0.5); color: #0b1020; }
      .btn-ghost-custom { border-radius: 999px; text-decoration: none; border: 1px solid #4b5563; padding: 0.7rem 1.6rem; background: transparent; color: #e5e7eb; transition: background 0.2s ease; cursor: pointer; }
      .btn-ghost-custom:hover { background: #111827; color: #e5e7eb; }
      .icon-link:hover { transform: translateY(-6px); border: 1px solid #3b82f6 !important; box-shadow: 0 0 20px rgba(59,130,246,0.25) !important; color: #3b82f6 !important; }
      .skill-card:hover { transform: translateY(-6px) !important; border: 1px solid #3b82f6 !important; box-shadow: 0 0 25px rgba(59,130,246,0.3) !important; }
      .project-card:hover { transform: translateY(-6px) !important; border: 1px solid #3b82f6 !important; box-shadow: 0 0 25px rgba(59,130,246,0.3) !important; }
      .stack-item:hover { transform: translateX(6px) !important; border: 1px solid #3b82f6 !important; }
      .project-link:hover { letter-spacing: 0.4px !important; }
      .hero-photo-hover:hover { transform: scale(1.04) !important; box-shadow: 0 20px 45px rgba(0, 0, 0, 0.45) !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
